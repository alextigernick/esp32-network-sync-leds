<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 Node</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    h1 { margin: 0; font-size: 1.4rem; letter-spacing: .1em; color: #0f9; }
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.2rem 1.8rem;
      width: 280px;
    }
    .card h2 {
      margin: 0 0 1rem;
      font-size: .9rem;
      text-transform: uppercase;
      color: #888;
      letter-spacing: .08em;
    }
    button {
      width: 100%;
      padding: .8rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-family: monospace;
      transition: background .15s;
      margin-top: .4rem;
    }
    .btn-on  { background: #0f9; color: #000; }
    .btn-off { background: #333; color: #aaa; }
    .btn-verify { background: #336; color: #99f; }
    select {
      width: 100%;
      padding: .6rem;
      background: #282828;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      font-family: monospace;
      font-size: .9rem;
      cursor: pointer;
    }
    input[type=file] { width: 100%; color: #eee; margin-bottom: .8rem; }
    .time { font-size: .8rem; color: #555; text-align: center; }
    .badge {
      display: inline-block;
      font-size: .7rem;
      padding: .15rem .5rem;
      border-radius: 4px;
      margin-left: .5rem;
      vertical-align: middle;
    }
    .badge-pending { background: #530; color: #fa0; }
    .badge-valid   { background: #030; color: #0f9; }
    .kv { display: flex; justify-content: space-between; font-size: .85rem; margin: .25rem 0; }
    .kv span:first-child { color: #888; }
    .kv span:last-child  { color: #cfc; font-variant-numeric: tabular-nums; }
    .kv span.stale { color: #fa0; }
    .row { display: flex; align-items: center; gap: .6rem; margin: .4rem 0; }
    .row label { color: #888; font-size: .85rem; min-width: 4.5rem; }
    .row input[type=range] { flex: 1; accent-color: #0f9; }
    .row .val { color: #cfc; font-size: .85rem; min-width: 4rem; text-align: right; font-variant-numeric: tabular-nums; }
    .btn-flash-on  { background: #0f9; color: #000; }
    .btn-flash-off { background: #333; color: #aaa; }
    .row input[type=range].r-track { accent-color: #f55; }
    .row input[type=range].g-track { accent-color: #5f5; }
    .row input[type=range].b-track { accent-color: #55f; }
    .color-preview {
      width: 100%; height: 28px; border-radius: 6px;
      margin: .6rem 0 .2rem;
      border: 1px solid #333;
      transition: background .1s;
    }
    .card.grid-card { width: auto; min-width: 280px; max-width: 90vw; }
    .grid-inp {
      width: 3.5rem; padding: .3rem .4rem;
      background: #282828; color: #eee;
      border: 1px solid #444; border-radius: 6px;
      font-family: monospace; font-size: .9rem; text-align: center;
    }
    #grid-table { border-collapse: collapse; margin-top: .8rem; font-size: .75rem; }
    #grid-table td {
      border: 1px solid #333; width: 2rem; height: 1.6rem;
      text-align: center; color: #0f9;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }
    #grid-table td:hover { background: #2a2a2a; }
    #grid-table td.row-rev { color: #f90; }
    #grid-table td.lit { background: #1a3a1a; outline: 1px solid #0f9; }
  </style>
</head>
<body>
  <h1>ESP32 NODE <span id="ota-badge"></span></h1>

  <!-- LED control -->
  <div class="card">
    <h2>LED Control</h2>
    <button id="led-btn" onclick="toggleLed()">...</button>
  </div>

  <!-- Synchronized flash -->
  <div class="card">
    <h2>Synchronized Flash</h2>
    <button id="flash-btn" onclick="toggleFlash()">...</button>
    <div class="row" style="margin-top:.8rem">
      <label>Period</label>
      <input type="range" id="period-sl" min="100" max="10000" step="100" value="1000"
             oninput="updateSliderLabel('period-sl','period-val',v=>v/1000+'s'); scheduleSettingsPush()">
      <span class="val" id="period-val">1.0s</span>
    </div>
    <div class="row">
      <label>Duty</label>
      <input type="range" id="duty-sl" min="1" max="100" step="1" value="50"
             oninput="updateSliderLabel('duty-sl','duty-val',v=>v+'%'); scheduleSettingsPush()">
      <span class="val" id="duty-val">50%</span>
    </div>
    <div style="border-top:1px solid #2a2a2a;margin:.8rem 0 .4rem"></div>
    <div class="row">
      <label>R</label>
      <input type="range" class="r-track" id="r-sl" min="0" max="255" step="1" value="255"
             oninput="updateColor(); scheduleSettingsPush()">
      <span class="val" id="r-val">255</span>
    </div>
    <div class="row">
      <label>G</label>
      <input type="range" class="g-track" id="g-sl" min="0" max="255" step="1" value="255"
             oninput="updateColor(); scheduleSettingsPush()">
      <span class="val" id="g-val">255</span>
    </div>
    <div class="row">
      <label>B</label>
      <input type="range" class="b-track" id="b-sl" min="0" max="255" step="1" value="255"
             oninput="updateColor(); scheduleSettingsPush()">
      <span class="val" id="b-val">255</span>
    </div>
    <div class="color-preview" id="color-preview"></div>
  </div>

  <!-- Node config -->
  <div class="card">
    <h2>Node Config</h2>
    <div class="row">
      <label>Strip len</label>
      <input type="number" id="num-leds-inp" min="1" max="500" value="8"
             style="flex:1;padding:.4rem;background:#282828;color:#eee;border:1px solid #444;border-radius:6px;font-family:monospace;font-size:.9rem">
      <span class="val" style="min-width:2rem">LEDs</span>
    </div>
    <button class="btn-off" style="margin-top:.6rem" onclick="saveNodeConfig()">Save</button>
  </div>

  <!-- Grid config -->
  <div class="card grid-card">
    <h2>Grid Layout</h2>
    <div class="row">
      <label>Rows</label>
      <input type="number" class="grid-inp" id="grid-rows" min="1" max="32" value="4">
      <label style="margin-left:.6rem">Cols</label>
      <input type="number" class="grid-inp" id="grid-cols" min="1" max="32" value="8">
    </div>
    <div class="row" style="margin-top:.4rem">
      <label>Origin</label>
      <select id="grid-origin" style="flex:1;padding:.3rem .4rem;background:#282828;color:#eee;border:1px solid #444;border-radius:6px;font-family:monospace;font-size:.85rem">
        <option value="0">Top-left</option>
        <option value="1">Top-right</option>
        <option value="2">Bottom-left</option>
        <option value="3">Bottom-right</option>
      </select>
    </div>
    <div class="row" style="margin-top:.4rem">
      <label>Direction</label>
      <select id="grid-dir" style="flex:1;padding:.3rem .4rem;background:#282828;color:#eee;border:1px solid #444;border-radius:6px;font-family:monospace;font-size:.85rem">
        <option value="1">Row-first (L↔R)</option>
        <option value="0">Col-first (T↕B)</option>
      </select>
    </div>
    <div style="font-size:.75rem;color:#555;margin-top:.4rem">
      Green = forward run &nbsp;·&nbsp; <span style="color:#f90">Orange</span> = reversed run
    </div>
    <div style="overflow-x:auto"><table id="grid-table"></table></div>
    <button class="btn-off" style="margin-top:.8rem" onclick="saveGridConfig()">Save</button>
  </div>

  <!-- Peer navigator -->
  <div class="card">
    <h2>Other Nodes (<span id="peer-count">0</span> found)</h2>
    <select id="peer-select" onchange="if(this.value) window.location='http://'+this.value">
      <option value="">-- navigate to node --</option>
    </select>
  </div>

  <!-- OTA update -->
  <div class="card">
    <h2>OTA Update</h2>
    <form method="POST" action="/ota" enctype="multipart/form-data">
      <input type="file" name="firmware" accept=".bin">
      <button class="btn-off" type="submit">Flash Firmware</button>
    </form>
    <button class="btn-verify" onclick="verify()">Verify &amp; Cancel Rollback</button>
  </div>

  <!-- Time sync debug -->
  <div class="card">
    <h2>Time Sync</h2>
    <div class="kv"><span>role</span><span id="ts-role">—</span></div>
    <div class="kv"><span>synced time</span><span id="ts-ms">—</span></div>
    <div class="kv"><span>offset</span><span id="ts-offset">—</span></div>
    <div class="kv"><span>last RTT</span><span id="ts-rtt">—</span></div>
    <div class="kv"><span>syncs ok / fail</span><span id="ts-counts">—</span></div>
    <div style="display:flex;gap:.3rem;margin-top:.8rem;align-items:stretch">
      <div style="display:flex;flex-direction:column;justify-content:space-between;font-size:.7rem;color:#555;text-align:right;min-width:2.5rem">
        <span id="plot-max">—</span>
        <span id="plot-min">—</span>
      </div>
      <canvas id="offset-plot" width="220" height="80"
              style="border:1px solid #333;border-radius:4px;display:block"></canvas>
    </div>
    <div style="font-size:.7rem;color:#555;text-align:center;margin-top:.2rem">offset jitter</div>
  </div>

  <script>
    let _pushTimer = null;
    function scheduleSettingsPush() {
      clearTimeout(_pushTimer);
      _pushTimer = setTimeout(pushSettings, 300);
    }

    function updateSliderLabel(sliderId, labelId, fmt) {
      const v = +document.getElementById(sliderId).value;
      document.getElementById(labelId).textContent = fmt(v);
    }

    function updateColor() {
      const r = +document.getElementById('r-sl').value;
      const g = +document.getElementById('g-sl').value;
      const b = +document.getElementById('b-sl').value;
      document.getElementById('r-val').textContent = r;
      document.getElementById('g-val').textContent = g;
      document.getElementById('b-val').textContent = b;
      document.getElementById('color-preview').style.background =
        `rgb(${r},${g},${b})`;
    }

    async function pushSettings(forward = true) {
      const flash  = document.getElementById('flash-btn').dataset.enabled === '1' ? 1 : 0;
      const period = document.getElementById('period-sl').value;
      const duty   = document.getElementById('duty-sl').value;
      const r      = document.getElementById('r-sl').value;
      const g      = document.getElementById('g-sl').value;
      const b      = document.getElementById('b-sl').value;
      const url    = forward ? '/settings' : '/settings?fwd=0';
      await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `flash=${flash}&period=${period}&duty=${duty}&r=${r}&g=${g}&b=${b}`,
      });
    }

    async function toggleFlash() {
      const btn = document.getElementById('flash-btn');
      btn.dataset.enabled = btn.dataset.enabled === '1' ? '0' : '1';
      updateFlashBtn(btn.dataset.enabled === '1');
      await pushSettings();
    }

    function updateFlashBtn(on) {
      const btn = document.getElementById('flash-btn');
      btn.dataset.enabled = on ? '1' : '0';
      btn.textContent = on ? 'Flash ON — tap to disable' : 'Flash OFF — tap to enable';
      btn.className = on ? 'btn-flash-on' : 'btn-flash-off';
    }

    // ---- offset plot -------------------------------------------------------
    const PLOT_MAX = 120; // samples kept (~6 min at 3s poll)
    const offsetHistory = [];

    function drawOffsetPlot() {
      const canvas = document.getElementById('offset-plot');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      if (offsetHistory.length < 2) return;

      const min = Math.min(...offsetHistory);
      const max = Math.max(...offsetHistory);
      const span = max - min || 1;
      const pad = 6;

      // Axis zero line
      const zeroY = H - pad - ((0 - min) / span) * (H - 2 * pad);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, zeroY);
      ctx.lineTo(W, zeroY);
      ctx.stroke();

      // Data line
      ctx.strokeStyle = '#0f9';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      offsetHistory.forEach((v, i) => {
        const x = (i / (PLOT_MAX - 1)) * W;
        const y = H - pad - ((v - min) / span) * (H - 2 * pad);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Labels
      const fmt = us => Math.abs(us) >= 1000
        ? (us / 1000).toFixed(2) + 'ms'
        : us.toFixed(0) + 'µs';
      document.getElementById('plot-min').textContent = fmt(min);
      document.getElementById('plot-max').textContent = fmt(max);
    }

    async function fetchState() {
      try {
        const r = await fetch('/state');
        if (!r.ok) return;
        const s = await r.json();

        // LED button
        const btn = document.getElementById('led-btn');
        if (s.led) {
          btn.textContent = 'LED is ON — tap to turn OFF';
          btn.className = 'btn-on';
        } else {
          btn.textContent = 'LED is OFF — tap to turn ON';
          btn.className = 'btn-off';
        }

        // Flash settings (only update sliders if user is not dragging)
        if (s.flash_enabled !== undefined) {
          updateFlashBtn(s.flash_enabled);
          // Only sync slider if not being interacted with
          if (document.activeElement !== document.getElementById('period-sl')) {
            document.getElementById('period-sl').value = s.period_ms;
            document.getElementById('period-val').textContent = (s.period_ms / 1000).toFixed(1) + 's';
          }
          if (document.activeElement !== document.getElementById('duty-sl')) {
            document.getElementById('duty-sl').value = s.duty_percent;
            document.getElementById('duty-val').textContent = s.duty_percent + '%';
          }
          const colorActive = ['r-sl','g-sl','b-sl'].includes(document.activeElement.id);
          if (!colorActive && s.r !== undefined) {
            document.getElementById('r-sl').value = s.r;
            document.getElementById('g-sl').value = s.g;
            document.getElementById('b-sl').value = s.b;
            updateColor();
          }
        }

        // Peers
        document.getElementById('peer-count').textContent = s.peers.length;
        const sel = document.getElementById('peer-select');
        sel.innerHTML = '<option value="">-- navigate to node --</option>';
        s.peers.forEach(p => {
          const o = document.createElement('option');
          o.value = p.ip;
          o.textContent = p.name + '  (' + p.ip + ')';
          sel.appendChild(o);
        });

        // Time sync debug
        document.getElementById('ts-role').textContent = s.ts_role;
        document.getElementById('ts-ms').textContent = s.sync_ms + ' ms';
        const offsetUs = s.ts_offset_us;
        document.getElementById('ts-offset').textContent =
          offsetUs === undefined ? '—' : (offsetUs / 1000).toFixed(2) + ' ms';
        if (offsetUs !== undefined && offsetUs >= -1e9) {
          offsetHistory.push(offsetUs);
          if (offsetHistory.length > PLOT_MAX) offsetHistory.shift();
          drawOffsetPlot();
        }
        const rttEl = document.getElementById('ts-rtt');
        if (s.ts_rtt_us < 0) {
          rttEl.textContent = 'never';
          rttEl.className = 'stale';
        } else {
          rttEl.textContent = (s.ts_rtt_us / 1000).toFixed(2) + ' ms';
          rttEl.className = '';
        }
        document.getElementById('ts-counts').textContent =
          s.ts_sync_count + ' / ' + s.ts_fail_count;

        // OTA pending badge
        const badge = document.getElementById('ota-badge');
        if (s.ota_pending) {
          badge.textContent = 'PENDING VERIFY';
          badge.className = 'badge badge-pending';
        } else {
          badge.textContent = 'verified';
          badge.className = 'badge badge-valid';
        }
      } catch (e) {
        console.warn('state fetch failed', e);
      }
    }

    async function toggleLed() {
      const btn = document.getElementById('led-btn');
      const turningOn = btn.className === 'btn-off';
      await fetch('/led', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'state=' + (turningOn ? 'on' : 'off'),
      });
      await fetchState();
    }

    async function verify() {
      const r = await fetch('/ota/verify', {method: 'POST'});
      const msg = await r.text();
      alert(msg);
      await fetchState();
    }

    async function fetchNodeConfig() {
      try {
        const r = await fetch('/node_config');
        if (!r.ok) return;
        const s = await r.json();
        document.getElementById('num-leds-inp').value = s.num_leds;
      } catch (e) { console.warn('node_config fetch failed', e); }
    }

    async function saveNodeConfig() {
      const n = document.getElementById('num-leds-inp').value;
      await fetch('/node_config', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'num_leds=' + n,
      });
    }

    // ---- grid config -------------------------------------------------------

    let _litPixel = null;

    async function tapPixel(td, idx) {
      if (_litPixel !== null) _litPixel.classList.remove('lit');
      if (_litPixel === td) {
        // second tap on same cell → turn off
        _litPixel = null;
        await fetch('/led_pixel', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: 'idx=-1',
        });
        return;
      }
      _litPixel = td;
      td.classList.add('lit');
      await fetch('/led_pixel', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `idx=${idx}`,
      });
    }

    function renderGrid() {
      const rows      = Math.max(1, Math.min(32, +document.getElementById('grid-rows').value   || 4));
      const cols      = Math.max(1, Math.min(32, +document.getElementById('grid-cols').value   || 8));
      const origin    = +document.getElementById('grid-origin').value;
      const rowFirst  = +document.getElementById('grid-dir').value;

      // origin bits: bit1 = flip rows, bit0 = flip cols
      const flipRows = (origin === 2 || origin === 3);
      const flipCols = (origin === 1 || origin === 3);

      // ledIndex(r, c) → physical LED index for grid position (row r, col c)
      function ledIndex(r, c) {
        // apply origin flip to get run/position within a line
        const pr = flipRows ? (rows - 1 - r) : r;
        const pc = flipCols ? (cols - 1 - c) : c;
        if (rowFirst) {
          // run = pr, position within run = pc; even runs go forward, odd reversed
          const pos = (pr % 2 === 0) ? pc : (cols - 1 - pc);
          return pr * cols + pos;
        } else {
          // run = pc, position within run = pr; even runs go forward, odd reversed
          const pos = (pc % 2 === 0) ? pr : (rows - 1 - pr);
          return pc * rows + pos;
        }
      }

      // isReversed(r, c) → true if this cell is on a reversed run
      function isReversed(r, c) {
        const pr = flipRows ? (rows - 1 - r) : r;
        const pc = flipCols ? (cols - 1 - c) : c;
        return rowFirst ? (pr % 2 !== 0) : (pc % 2 !== 0);
      }

      _litPixel = null;
      const tbl = document.getElementById('grid-table');
      tbl.innerHTML = '';
      for (let r = 0; r < rows; r++) {
        const tr = document.createElement('tr');
        for (let c = 0; c < cols; c++) {
          const td = document.createElement('td');
          const idx = ledIndex(r, c);
          td.textContent = idx;
          if (isReversed(r, c)) td.className = 'row-rev';
          td.onclick = () => tapPixel(td, idx);
          tr.appendChild(td);
        }
        tbl.appendChild(tr);
      }
    }

    // Re-render whenever any input changes
    ['grid-rows','grid-cols','grid-origin','grid-dir'].forEach(id =>
      document.getElementById(id).addEventListener('input', renderGrid));

    async function fetchGridConfig() {
      try {
        const r = await fetch('/grid_config');
        if (!r.ok) return;
        const g = await r.json();
        document.getElementById('grid-rows').value   = g.rows;
        document.getElementById('grid-cols').value   = g.cols;
        document.getElementById('grid-origin').value = g.origin;
        document.getElementById('grid-dir').value    = g.row_first;
        renderGrid();
      } catch (e) { console.warn('grid_config fetch failed', e); }
    }

    async function saveGridConfig() {
      const rows     = document.getElementById('grid-rows').value;
      const cols     = document.getElementById('grid-cols').value;
      const origin   = document.getElementById('grid-origin').value;
      const rowFirst = document.getElementById('grid-dir').value;
      await fetch('/grid_config', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `rows=${rows}&cols=${cols}&origin=${origin}&row_first=${rowFirst}`,
      });
    }

    updateColor();
    fetchState();
    fetchNodeConfig();
    fetchGridConfig();
    setInterval(fetchState, 3000);
  </script>
</body>
</html>
